<svg width="220" height="52" viewBox="0 0 220 52" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Esagono: sfondo surface dark del sito, bordo divider dark -->
  <polygon points="24,3 41,12.5 41,31.5 24,41 7,31.5 7,12.5"
