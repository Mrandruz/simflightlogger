  <!-- Zona cielo: tinta primario dark -->
  <polygon points="24,3 41,12.5 41,22 7,22 7,12.5"
    fill="#4d8eff" fill-opacity="0.14"/>
  <!-- Linea orizzonte -->
  <line x1="10" y1="23" x2="38" y2="23" stroke="#293a4c" stroke-width="1"/>
  <!-- Rotta in primario dark -->
  <circle cx="14" cy="17.5" r="2.8" fill="#4d8eff"/>
  <circle cx="33" cy="13.5" r="2.8" fill="#4d8eff"/>
  <line x1="17" y1="16.8" x2="30" y2="14.2"
    stroke="#4d8eff" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="52" y="29"
    font-family="'Poppins', 'Inter', -apple-system, sans-serif"
    font-size="22" font-weight="600" letter-spacing="-0.4"
